name: Publish l402-ai-sdk

on:
  workflow_call:

jobs:
  build:
    name: Build AI SDK package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: corepack enable
      - name: Install dependencies
        working-directory: packages/l402-ai-sdk
        run: yarn install
      - name: Build TypeScript
        working-directory: packages/l402-ai-sdk
        run: yarn build

      - uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: packages/l402-ai-sdk
          key: l402-ai-sdk-${{ github.sha }}

  dry-run:
    name: Dry-run publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: packages/l402-ai-sdk
          key: l402-ai-sdk-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Dry-run npm publish
        working-directory: packages/l402-ai-sdk
        run: npm publish --dry-run

  publish:
    name: Publish to npm
    environment: npm-publish
    runs-on: ubuntu-latest
    needs: dry-run
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: packages/l402-ai-sdk
          key: l402-ai-sdk-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Publish @lightninglabs/l402-ai
        working-directory: packages/l402-ai-sdk
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
