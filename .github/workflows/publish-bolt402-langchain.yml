name: Publish bolt402-langchain

on:
  workflow_call:

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        working-directory: packages/bolt402-langchain
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: langchain-dist
          path: packages/bolt402-langchain/dist/

  dry-run:
    name: Dry-run publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: langchain-dist
          path: dist
      - name: Check packages
        run: |
          pip install twine
          twine check dist/*
          echo "Packages to publish:"
          ls -la dist/

  publish:
    name: Publish to PyPI
    environment: pypi-publish
    runs-on: ubuntu-latest
    needs: dry-run
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: langchain-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@76f52bc884231f62b54a4f29bf5e640674024aa5 # v1.12.4
        with:
          packages-dir: dist/
