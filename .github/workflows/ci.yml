name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace --exclude bolt402-python --exclude bolt402-wasm --exclude bolt402-regtest --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace --exclude bolt402-python --exclude bolt402-wasm --exclude bolt402-regtest

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo doc --workspace --exclude bolt402-python --exclude bolt402-wasm --exclude bolt402-regtest --no-deps

  python:
    name: Python Bindings
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bolt402-python
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5
        with:
          python-version: '3.12'
      - run: sudo apt-get install -y protobuf-compiler
      - run: python -m venv .venv
      - run: .venv/bin/pip install maturin pytest
      - run: .venv/bin/maturin develop
      - run: .venv/bin/pytest tests/ -v

  go:
    name: Go Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.21'
      - run: sudo apt-get install -y protobuf-compiler
      - name: Build FFI static library
        run: cargo build -p bolt402-ffi --release
      - name: Copy library to Go bindings
        run: |
          mkdir -p bindings/bolt402-go/lib
          cp target/release/libbolt402_ffi.a bindings/bolt402-go/lib/
      - name: Run Go tests
        working-directory: bindings/bolt402-go
        run: go test -v ./...

  wasm:
    name: WASM Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - name: Install wasm-pack
        run: curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1 wasm-pack-v0.14.0-x86_64-unknown-linux-musl/wasm-pack
      - name: Build WASM (web target)
        run: wasm-pack build crates/bolt402-wasm --target web
      - name: Run native unit tests
        run: cargo test -p bolt402-wasm
      - name: Run WASM browser tests
        run: wasm-pack test --headless --chrome crates/bolt402-wasm

  langchain:
    name: LangChain Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5
        with:
          python-version: '3.12'
      - run: sudo apt-get install -y protobuf-compiler
      - name: Build Python bindings
        working-directory: crates/bolt402-python
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest
          .venv/bin/maturin develop
      - name: Install bolt402-langchain
        working-directory: crates/bolt402-python
        run: .venv/bin/pip install -e ../../packages/bolt402-langchain
      - name: Run LangChain tests
        working-directory: crates/bolt402-python
        run: .venv/bin/pytest ../../packages/bolt402-langchain/tests/ -v

  wasm-node-tests:
    name: WASM Node.js Tests
    needs: wasm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bolt402-wasm/tests/node
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - name: Install wasm-pack
        run: curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1 wasm-pack-v0.14.0-x86_64-unknown-linux-musl/wasm-pack
      - name: Build WASM package
        run: wasm-pack build crates/bolt402-wasm --target web
        working-directory: ${{ github.workspace }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: yarn install --no-immutable
      - run: yarn vitest run

  typescript:
    name: TypeScript (bolt402-ai-sdk)
    needs: wasm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/bolt402-ai-sdk
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - name: Install wasm-pack
        run: curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1 wasm-pack-v0.14.0-x86_64-unknown-linux-musl/wasm-pack
      - name: Build WASM package
        run: wasm-pack build crates/bolt402-wasm --target web
        working-directory: .
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: yarn install --no-immutable  # WASM pkg is rebuilt each CI run, hash always changes
      - run: yarn tsc --noEmit
      - run: yarn vitest run
