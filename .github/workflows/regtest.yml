name: Regtest Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger for debugging
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  regtest:
    name: Regtest (L402 end-to-end)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Install wasm-pack
        run: curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1 wasm-pack-v0.14.0-x86_64-unknown-linux-musl/wasm-pack

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Compile regtest tests (without running)
        run: cargo test -p bolt402-regtest --no-run

      - name: Build WASM package
        run: wasm-pack build crates/bolt402-wasm --target web

      - name: Install WASM Node.js test dependencies
        working-directory: crates/bolt402-wasm/tests/node
        run: |
          corepack enable
          yarn install --no-immutable

      - name: Build Python bindings
        working-directory: crates/bolt402-python
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest
          .venv/bin/maturin develop

      - name: Start Docker services
        run: make regtest-up

      - name: Wait for services to be healthy
        working-directory: tests/regtest
        run: |
          echo "Waiting for bitcoind..."
          docker compose exec -T bitcoind bitcoin-cli -regtest -rpcuser=regtest -rpcpassword=regtest -rpcwait getblockchaininfo > /dev/null

          echo "Waiting for lnd-alice..."
          timeout 120 bash -c 'until docker compose exec -T lnd-alice lncli --network=regtest --tlscertpath=/tls/alice-tls.cert getinfo 2>/dev/null; do sleep 3; done'

          echo "Waiting for lnd-bob..."
          timeout 120 bash -c 'until docker compose exec -T lnd-bob lncli --network=regtest --tlscertpath=/tls/bob-tls.cert getinfo 2>/dev/null; do sleep 3; done'

          echo "Waiting for cln..."
          timeout 120 bash -c 'until docker compose exec -T cln lightning-cli --network=regtest getinfo 2>/dev/null; do sleep 3; done'

          echo "All services ready."

      - name: Initialize regtest network
        run: make regtest-init

      - name: Wait for Aperture to be ready
        working-directory: tests/regtest
        run: |
          echo "Waiting for Aperture..."
          timeout 60 bash -c "until wget -S -O /dev/null http://localhost:8081/health 2>&1 | grep -q 'HTTP/'; do sleep 3; done"
          echo "Aperture ready."

      - name: Run Rust regtest integration tests
        run: make regtest-test-rust
        env:
          RUST_LOG: info

      - name: Run WASM/Node.js regtest integration tests
        run: make regtest-test-wasm
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Run Python regtest integration tests
        run: make regtest-test-python

      - name: Docker logs (on failure)
        if: failure()
        run: make regtest-logs

      - name: Teardown
        if: always()
        run: make regtest-down
