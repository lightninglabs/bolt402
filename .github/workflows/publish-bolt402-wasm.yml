name: Publish bolt402-wasm

on:
  workflow_call:

jobs:
  build:
    name: Build WASM package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - name: Install wasm-pack
        run: curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1 wasm-pack-v0.14.0-x86_64-unknown-linux-musl/wasm-pack
      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq
      - name: Build WASM (bundler target)
        run: wasm-pack build crates/bolt402-wasm --scope lightninglabs
      - name: Rename package to @lightninglabs/bolt402
        working-directory: crates/bolt402-wasm/pkg
        run: |
          jq '.name = "@lightninglabs/bolt402"' package.json > temp.json && mv temp.json package.json
          echo "Published package.json:"
          cat package.json
      - uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: crates/bolt402-wasm/pkg
          key: bolt402-wasm-${{ github.sha }}

  dry-run:
    name: Dry-run publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: crates/bolt402-wasm/pkg
          key: bolt402-wasm-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Dry-run npm publish
        working-directory: crates/bolt402-wasm/pkg
        run: npm publish --dry-run

  publish:
    name: Publish to npm
    environment: npm-publish
    runs-on: ubuntu-latest
    needs: dry-run
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: crates/bolt402-wasm/pkg
          key: bolt402-wasm-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Publish @lightninglabs/bolt402
        working-directory: crates/bolt402-wasm/pkg
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
