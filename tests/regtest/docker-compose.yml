services:
  bitcoind:
    image: bitcoin/bitcoin:30.2
    restart: unless-stopped
    command:
      - -regtest
      - -server
      - -rpcuser=regtest
      - -rpcpassword=regtest
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
      - -fallbackfee=0.00001
      - -txindex=1
    ports:
      - "18443:18443"
    volumes:
      - bitcoind-data:/home/bitcoin/.bitcoin
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=regtest", "-rpcpassword=regtest", "getblockchaininfo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # LND Alice: PAYER node. bolt402 client connects here (gRPC + REST).
  lnd-alice:
    image: lightninglabs/lnd:v0.20.1-beta
    restart: unless-stopped
    depends_on:
      bitcoind:
        condition: service_healthy
    volumes:
      - lnd-alice-data:/root/.lnd
      - ./lnd/alice.conf:/root/.lnd/lnd.conf:ro
      - ./lnd/tls:/tls:ro
    ports:
      - "10009:10009"  # gRPC
      - "8080:8080"    # REST
    healthcheck:
      test: ["CMD", "lncli", "--network=regtest", "--tlscertpath=/tls/alice-tls.cert", "getinfo"]
      interval: 5s
      timeout: 5s
      retries: 30

  # LND Bob: RECEIVER node. Aperture uses this to create invoices.
  lnd-bob:
    image: lightninglabs/lnd:v0.20.1-beta
    restart: unless-stopped
    depends_on:
      bitcoind:
        condition: service_healthy
    volumes:
      - lnd-bob-data:/root/.lnd
      - ./lnd/bob.conf:/root/.lnd/lnd.conf:ro
      - ./lnd/tls:/tls:ro
    ports:
      - "10010:10009"  # gRPC (different host port)
      - "8082:8080"    # REST (different host port)
    healthcheck:
      test: ["CMD", "lncli", "--network=regtest", "--tlscertpath=/tls/bob-tls.cert", "getinfo"]
      interval: 5s
      timeout: 5s
      retries: 30

  # CLN: PAYER node. For bolt402-cln backend tests.
  cln:
    image: elementsproject/lightningd:v25.12.1
    restart: unless-stopped
    environment:
      LIGHTNINGD_NETWORK: regtest
    depends_on:
      bitcoind:
        condition: service_healthy
    volumes:
      - cln-data:/root/.lightning
      - ./cln/config:/root/.lightning/config:ro
    ports:
      - "9736:9736"    # gRPC
      - "3010:3010"    # REST (clnrest)
    healthcheck:
      test: ["CMD", "lightning-cli", "--network=regtest", "getinfo"]
      interval: 5s
      timeout: 5s
      retries: 30

  # Simple backend HTTP server that Aperture proxies to.
  backend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: ["node", "server.js"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Aperture: Lightning Labs' reference L402 reverse proxy.
  # Sits in front of the backend server, requires Lightning payments via lnd-bob.
  # NOTE: Aperture Docker images are amd64-only. For local arm64 development,
  # build from source: docker build --build-arg checkout=v0.4.2 -t aperture:local
  # using the Dockerfile at https://github.com/lightninglabs/aperture
  aperture:
    image: lightninglabs/aperture:v0.4.2
    restart: unless-stopped
    depends_on:
      lnd-bob:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./aperture/aperture.yaml:/root/.aperture/aperture.yaml:ro
      - lnd-bob-data:/lnd:ro
      - ./lnd/tls:/tls:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -S -O /dev/null http://127.0.0.1:8081/health 2>&1 | grep -q 'HTTP/'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 15s

  # SwissKnife: Numeraire's custodial Lightning wallet.
  # Connected to CLN via clnrest as the Lightning provider.
  # Provides REST API for bolt402-swissknife backend tests.
  swissknife:
    image: bitcoinnumeraire/swissknife-server:0.1.7
    restart: unless-stopped
    depends_on:
      cln:
        condition: service_healthy
    environment:
      RUN_MODE: production
      SWISSKNIFE_JWT__SECRET: "bolt402-regtest-jwt-secret-do-not-use-in-production"
      SWISSKNIFE_CLN_REST_CONFIG__RUNE: "${CLN_RUNE:-}"
    volumes:
      - ./swissknife/regtest.toml:/config/production.toml:ro
      - swissknife-data:/storage
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/v1/system/health || wget -q -O- http://127.0.0.1:3000/v1/system/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s

volumes:
  bitcoind-data:
  lnd-alice-data:
  lnd-bob-data:
  cln-data:
  swissknife-data:
